<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxCast Player Style Customizer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      <h1>BoxCast Style Customizer</h1>
    </div>
    <div class="header-sep"></div>
    <span class="header-sub">Embed CSS Generator</span>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <button class="hbtn danger" onclick="resetAll()">↺ Reset All</button>
    </div>
  </header>

  <main>

    <!-- LEFT: ELEMENT LIST -->
    <div class="panel left-panel">
      <div class="panel-hd">
        <div class="dot" style="background:#4f8ef7"></div>
        Player Elements
      </div>
      <div class="section-scroll" id="elementList"></div>
    </div>

    <!-- MIDDLE: LIVE PREVIEW -->
    <div class="preview-panel">
      <div class="preview-toolbar">
        <div class="panel-hd">
          <div class="dot" style="background:#3ecf8e"></div>
          Live Preview
        </div>
        <div class="preview-spacer"></div>
        <div class="channel-input-wrap">
          Channel ID:
          <input type="text" id="channelIdInput" placeholder="your-channel-id" value="lsvkjorvnnck7hq9aew7" />
          <button class="load-btn" onclick="loadPlayer()">Load</button>
        </div>
      </div>
      <div class="preview-area">
        <div id="boxcast-preview-wrapper">
          <div class="preview-placeholder" id="preview-placeholder">
            <div class="big">▶</div>
            <div>Enter a Channel ID and click Load</div>
            <div style="font-size:10px;opacity:0.5">Uses your real BoxCast embed</div>
          </div>
          <div id="boxcast-widget-preview" style="display:none"></div>
        </div>
        <div class="preview-note">Styles apply via injected &lt;style&gt; — scroll down if player is below fold</div>
      </div>
    </div>

    <!-- RIGHT: CONTROLS + CODE OUTPUT -->
    <div class="panel right-panel">
      <div class="tabs">
        <button class="tab active" data-tab="style">Style Controls</button>
        <button class="tab" data-tab="code">CSS Output</button>
      </div>

      <div id="tab-style" class="active">
        <div class="empty-state" id="emptyState">
          <div class="arrow">←</div>
          <div>Select an element to<br>edit its styles</div>
        </div>
        <div id="styleControls" style="display:none"></div>
      </div>

      <div id="tab-code">
        <div class="code-actions">
          <button class="copy-btn" id="copyBtn" onclick="copyCSS()">Copy CSS</button>
          <button class="dl-btn" onclick="downloadCSS()">Download .css</button>
        </div>
        <textarea id="code-output" readonly spellcheck="false"></textarea>
      </div>
    </div>

  </main>

  <!-- injected player styles -->
  <style id="custom-style-tag"></style>


</body>

</html>
